<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polly · blob-share</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
    .status-bar {
      background: #1e293b;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      font-family: ui-monospace, monospace;
    }
    .status-bar .label { color: #64748b; }
    .status-bar .connected { color: #34d399; }
    .status-bar .disconnected { color: #f87171; }
    .drop-zone {
      border: 2px dashed #475569;
      border-radius: 0.5rem;
      padding: 3rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 2rem;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #60a5fa;
      background: rgba(96, 165, 250, 0.05);
    }
    .drop-zone p { color: #94a3b8; }
    .drop-zone input { display: none; }
    .file-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .file-item {
      background: #1e293b;
      border-radius: 0.5rem;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 0.8rem; color: #64748b; font-family: ui-monospace, monospace; }
    .file-status {
      font-size: 0.8rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      white-space: nowrap;
    }
    .status-local { background: rgba(52, 211, 153, 0.15); color: #34d399; }
    .status-remote { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
    .status-downloading { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .file-actions { display: flex; gap: 0.5rem; }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .progress {
      height: 3px;
      background: #334155;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    .progress-bar {
      height: 100%;
      background: #60a5fa;
      transition: width 0.1s;
      width: 0%;
    }
    .log {
      margin-top: 2rem;
      padding: 1rem;
      background: #020617;
      border-radius: 0.5rem;
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-line { color: #94a3b8; margin-bottom: 0.25rem; }
    .log-line.error { color: #f87171; }
  </style>
</head>
<body>
  <h1>Polly · blob-share</h1>
  <p class="subtitle">Drop a file to share it peer-to-peer. Open a second tab to receive.</p>

  <div class="status-bar">
    <div><span class="label">peer:</span> <span id="peer-id">—</span></div>
    <div><span class="label">signalling:</span> <span id="signaling-status" class="disconnected">connecting…</span></div>
    <div><span class="label">connected peers:</span> <span id="peer-count">0</span></div>
  </div>

  <label class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" multiple>
    <p>Drop files here or click to choose</p>
  </label>

  <div class="file-list" id="file-list"></div>

  <div class="log" id="log"></div>

  <script type="module" src="/main.js"></script>
</body>
</html>
